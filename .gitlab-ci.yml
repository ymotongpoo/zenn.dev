stages:
  - build

build:telemetry-sampling:
  stage: build
  image: ubuntu:24.04
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends
        pandoc
        texlive-xetex
        texlive-lang-japanese
        fonts-noto-cjk
        yq
  script:
    - cd books/telemetry-sampling
    - |
      chapters=$(yq -r '.chapters[]' config.yaml | sed 's/$/.md/' | tr '\n' ' ')
      echo "Building with chapters: $chapters"
      pandoc $chapters -o telemetry-sampling.pdf \
        --pdf-engine=xelatex \
        -V CJKmainfont="Noto Sans CJK JP" \
        -V geometry:margin=1in \
        --toc \
        --number-sections \
        --metadata title="$(yq -r '.title' config.yaml)"
  artifacts:
    paths:
      - books/telemetry-sampling/telemetry-sampling.pdf
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.*/'
      changes:
        - books/telemetry-sampling/**/*.md
        - books/telemetry-sampling/config.yaml

